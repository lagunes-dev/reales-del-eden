  <script type="text/babel" data-presets="react">
    const { useEffect, useRef, useState, memo } = React;
    const motion = Motion.motion;

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    const FadingVideo = memo(function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;

        function fadeTo(target, durMs) {
          if (rafRef.current !== null) {
            cancelAnimationFrame(rafRef.current);
          }
          const startOp = parseFloat(v.style.opacity) || 0;
          const delta = target - startOp;
          const t0 = performance.now();
          function tick(now) {
            const elapsed = Math.min(1, (now - t0) / durMs);
            const eased = elapsed * (2 - elapsed);
            v.style.opacity = String(startOp + delta * eased);
            if (elapsed < 1) {
              rafRef.current = requestAnimationFrame(tick);
            } else {
              rafRef.current = null;
            }
          }
          rafRef.current = requestAnimationFrame(tick);
        }

        const onLoaded = () => {
          v.style.opacity = "0";
          v.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!v.duration || !isFinite(v.duration)) return;
          const remain = v.duration - v.currentTime;
          if (!fadingOutRef.current && remain <= FADE_OUT_LEAD && remain > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          v.style.opacity = "0";
          fadingOutRef.current = false;
          setTimeout(() => {
            v.currentTime = 0;
            fadingOutRef.current = false;
            v.play().catch(() => {});
            fadeTo(1, FADE_MS);
          }, 100);
        };

        v.addEventListener("loadeddata", onLoaded);
        v.addEventListener("timeupdate", onTimeUpdate);
        v.addEventListener("ended", onEnded);

        return () => {
          if (rafRef.current !== null) cancelAnimationFrame(rafRef.current);
          rafRef.current = null;
          v.removeEventListener("loadeddata", onLoaded);
          v.removeEventListener("timeupdate", onTimeUpdate);
          v.removeEventListener("ended", onEnded);
        };
      }, [src]);

      return (
        <video ref={videoRef} className={className} style={{ ...style, opacity: 0 }} muted playsInline preload="auto">
          <source src={src} type="video/mp4" />
        </video>
      );
    });



    function BlurText({ text, className }) {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      const words = text.split(/\s+/).filter(Boolean);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver(
          ([e]) => {
            if (e.isIntersecting) setVisible(true);
          },
          { threshold: 0.1 }
        );
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <p ref={ref} className={`flex flex-wrap justify-center gap-y-[0.1em] max-w-3xl mx-auto text-5xl md:text-6xl lg:text-[5.5rem] font-heading italic text-white leading-[0.85] tracking-[-4px] ${className || ""}`} style={{ rowGap: "0.1em" }}>
          {words.map((w, i) => (
            <motion.span
              key={`${w}-${i}`}
              className="inline-block font-heading italic text-white mr-[0.28em] decoration-transparent"
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={
                visible
                  ? {
                      filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
            >
              {w}
            </motion.span>
          ))}
        </p>
      );
    }

    function IconArrow(props) {
      return (
        <svg viewBox="0 0 24 24" width={20} height={20} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" className={props.className}>

    }

      const cards = [

              <div className="hidden md:flex liquid-glass rounded-full px-1.5 py-1.5 items-center gap-0 flex-wrap justify-center">
                {["Inicio", "Mensaje", "Formatos", "Tablero", "Ejecución"].map((label) => (

                <button

                >
                  Pedir fecha
                  <IconArrow />
                </button>
              </div>
              <div className="hidden md:block h-12 w-12 shrink-0" aria-hidden />
            </nav>

            <div className="relative z-10 flex flex-col flex-1 pt-28 px-4 items-center justify-center">
              <div>
                <motion.div
                  initial={{ filter: "blur(10px)", opacity: 0, y: 20 }}
                  animate={{ filter: "blur(0px)", opacity: 1, y: 0 }}
                  transition={{ delay: 0.4, duration: 0.8, ease: "easeOut" }}
                  className="liquid-glass rounded-full px-1 py-1 flex items-center gap-2 mb-8"
                >
                  <span className="rounded-full bg-white text-black px-3 py-1 text-xs font-semibold font-body">Deck</span>
                  <span className="text-sm text-white/90 font-body pr-3">Estrategia en diapositivas — Villahermosa</span>
                </motion.div>

                <BlurText text="Cuando proyectas bien la propuesta cerró antes del último slide" />

                <motion.p

                  initial={{ filter: "blur(10px)", opacity: 0, y: 20 }}
                  animate={{ filter: "blur(0px)", opacity: 1, y: 0 }}
                  transition={{ delay: 0.8, duration: 0.8, ease: "easeOut" }}
                >
                  Las diapositivas no sustituyen la recomendación; la ordenan. Un mensaje claro, prueba donde duele el miedo del organizador, y métricas que no mientan — todo en un flujo que se siente obra, no plantilla oscura chillona.
                </motion.p>

                <motion.div

                >

                </motion.div>

                <motion.div

                  animate={{ filter: "blur(0px)", opacity: 1, y: 0 }}

                >

                  </div>
                  <div className="liquid-glass rounded-[1.25rem] p-5 w-full sm:w-[220px] flex flex-col">
                    <svg className="w-7 h-7 text-white/90 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.25">
                      <circle cx="12" cy="12" r="9" />
                      <path d="M3 12h18M12 3a14 14 0 0 0 0 18" />
                    </svg>
                    <p className="font-heading italic text-4xl text-white tracking-[-1px] leading-none">2</p>
                    <p className="text-xs text-white/80 font-body font-light mt-2">Motores simultáneos en cada revisión viernes.</p>
                  </div>
                </motion.div>

                <motion.div

                  animate={{ opacity: 1 }}
                  transition={{ delay: 1.4, duration: 0.8 }}
                >

                    Misma rigurosidad si lo presentas en sala o por pantalla compartida

                  <div className="flex flex-wrap justify-center gap-x-10 md:gap-x-14 gap-y-4 font-heading italic text-2xl md:text-3xl text-white tracking-tight">
                    {["Prueba", "Origen", "Tablero", "Cierre", "Ritmo"].map((x) => (
                      <span key={x}>{x}</span>
                    ))}
                  </div>

              </div>
            </div>
          </section>

          {/* —— Capabilities — diapositivas —— */}
          <section className="relative min-h-screen bg-black flex flex-col">
            <FadingVideo
              src={secVideo}
              className="absolute inset-0 w-full h-full object-cover z-0 pointer-events-none"

            <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-28 pb-12 flex flex-col min-h-screen">

                  <motion.article

                      </div>
                    </div>
                    <div className="flex-1" />
                    <div className="mt-8">
                      <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">{c.title}</h3>
                      <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">{c.body}</p>
                    </div>
                  </motion.article>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
